# ========================================== #
#          AdvancedChat Messages             #
# ========================================== #
# Файл сообщений плагина AdvancedChat
# Все сообщения поддерживают MiniMessage форматирование
# 
# Цвета: <red>, <green>, <blue>, <yellow>, <aqua>, <gold>, и т.д.
# Форматирование: <b> (жирный), <i> (курсив), <u> (подчеркнутый), <st> (зачеркнутый)
# Градиенты: <gradient:#COLOR1:#COLOR2>текст</gradient>
# 
# Для отключения сообщения установите значение в "NONE"

# ------------------------------------------ #
#                 Префикс                    #
# ------------------------------------------ #
# Префикс добавляется ко всем сообщениям плагина
prefix: "<gold>[AdvancedChat]</gold> "

# ------------------------------------------ #
#           Команды и ошибки                 #
# ------------------------------------------ #
# Сообщение при отсутствии прав
no-permission: "<red>У вас нет прав.</red>"

# Сообщение при отсутствии прав на канал чата
no-permission-channel: "<red>У вас нет прав для письма в этот канал.</red>"

# Сообщение после успешной перезагрузки плагина (/ach reload)
reload-success: "<green>Конфигурация и сообщения успешно перезагружены.</green>"

# ------------------------------------------ #
#           Тихий режим (Silent)             #
# ------------------------------------------ #
# Сообщение при включении тихого режима (/ach silent)
silent-enabled: "<green>Тихий режим включен. Вы больше не будете получать сообщения из чата (кроме админов).</green>"

# Сообщение при выключении тихого режима
silent-disabled: "<yellow>Тихий режим выключен. Вы снова видите чат.</yellow>"

# ------------------------------------------ #
#                 Каналы                     #
# ------------------------------------------ #
# Сообщение при переключении канала чата
# {channel} - название канала
channel-switched: "<green>Вы переключились на канал: <white>{channel}</white></green>"

# Сообщение если канал не найден или нет прав
channel-not-found: "<red>У вас нет прав на этот канал или он не существует.</red>"

# ------------------------------------------ #
#                 Игнор                      #
# ------------------------------------------ #
# Сообщение при неправильном использовании команды игнора
ignore-usage: "<red>Использование: /ignorechat <ник></red>"

# Сообщение если игрок для игнора не найден
ignore-not-found: "<red>Игрок не найден.</red>"

# Сообщение при попытке игнорировать себя
ignore-self: "<red>Вы не можете игнорировать себя.</red>"

# Сообщение при попытке игнорировать администратора
ignore-admin: "<red>Вы не можете игнорировать администратора.</red>"

# Сообщение при добавлении игрока в игнор
# {player} - имя игрока
ignore-added: "<green>Вы добавили <white>{player}</white> в черный список.</green>"

# Сообщение при удалении игрока из игнора
# {player} - имя игрока
ignore-removed: "<yellow>Вы удалили <white>{player}</white> из черного списка.</yellow>"

# ------------------------------------------ #
#           Удаление сообщений               #
# ------------------------------------------ #
# Сообщение если не указан ID сообщения
delete-no-args: "<red>Ошибка: укажите ID сообщения.</red>"

# Сообщение если сообщение не найдено в кэше
delete-not-found: "<red>Сообщение устарело или не найдено в кэше.</red>"

# Сообщение при попытке удалить чужое сообщение
delete-not-yours: "<red>Вы можете удалять только свои собственные сообщения.</red>"

# Сообщение при успешном удалении
delete-success: "<green>Сообщение успешно удалено.</green>"

# ------------------------------------------ #
#           Меню помощи /ach                 #
# ------------------------------------------ #
# Заголовок меню помощи
help-header: "<gold>=== <yellow>AdvancedChat v1.0</yellow> ===</gold>"

# Описание команды перезагрузки
help-reload: "<gray>/ach reload</gray> - <white>Перезагрузить конфиг</white>"

# Описание команды переключения канала
help-chat: "<gray>/ach <канал></gray> - <white>Переключить чат (например: local, global)</white>"

# Описание команды тихого режима
help-silent: "<gray>/ach silent</gray> - <white>Включить тихий режим (не видеть чат)</white>"

# Описание команды игнора
help-ignore: "<gray>/ignorechat <ник></gray> - <white>Игнорировать игрока</white>"

# Описание команды очистки чата
help-chatclear: "<gray>/cc</gray> - <white>Очистить свой чат (можно /cc all или /cc users)</white>"

# ------------------------------------------ #
#           Очистка чата                     #
# ------------------------------------------ #
# Сообщение при очистке личного чата
chatclear-personal: "<green>Ваш чат был очищен (остались только сообщения администрации).</green>"

# Сообщение при очистке чата для всех (с сохранением админ-сообщений)
chatclear-global-users: "<green>Чат был очищен для всех игроков (сообщения администрации сохранены).</green>"

# Сообщение при полной очистке чата
chatclear-global-all: "<green>Чат был полностью очищен.</green>"

# ------------------------------------------ #
#           Шпион (Spy)                      #
# ------------------------------------------ #
# Сообщение при включении режима шпиона
spy-enabled: "<green>Режим шпиона включен. Теперь вы видите все локальные чаты на сервере.</green>"

# Сообщение при выключении режима шпиона
spy-disabled: "<yellow>Режим шпиона выключен.</yellow>"

# ------------------------------------------ #
#           Редактирование сообщений         #
# ------------------------------------------ #
# Сообщение если сообщение для редактирования не найдено
edit-not-found: "<red>Сообщение для редактирования не найдено или устарело.</red>"

# Сообщение при успешном редактировании
edit-success: "<green>Сообщение успешно изменено.</green>"

# Сообщение-подсказка для редактирования последнего сообщения
edit-click-prompt: "<yellow>✏ Нажмите сюда, чтобы изменить ваше последнее сообщение</yellow>"

# Сообщение при неправильном использовании команды редактирования
edit-no-args: "<red>Использование: /medit <id> <новый текст></red>"

# ------------------------------------------ #
#           Упоминания (Mentions)            #
# ------------------------------------------ #
# Сообщение при кулдауне на упоминание @everyone
# {time} - время ожидания в секундах
mention-everyone-cooldown: "<red>Вы не можете так часто упоминать всех! Подождите {time} сек.</red>"
