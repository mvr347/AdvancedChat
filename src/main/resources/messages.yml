pin-message-not-found: "<red>Сообщение с ID {id} не найдено!</red>"
pin-message-cannot-pin: "<red>Это сообщение нельзя закрепить!</red>"
pin-existing-success: "<green>Сообщение #{id} закреплено! ID закрепления: {pinId}</green>"
pin-cleared: "<green>Все закреплённые сообщения сняты!</green>"
pin-list-empty: "<yellow>Нет закреплённых сообщений.</yellow>"
pin-expired: "<dark_gray>[Закреплено] <gray>Сообщение #{messageId} было автоматически откреплено (истёк срок).</gray></dark_gray>"

# ========================================== #
#      ГОЛОСОВАНИЯ (POLLS)                   #
# ========================================== #
polls-disabled: "<red>Система голосований отключена!</red>"
poll-no-permission-create: "<red>У вас нет прав для создания голосований!</red>"
poll-no-permission-vote: "<red>У вас нет прав для голосования!</red>"
poll-no-options: "<red>Укажите варианты голосования!</red>"
poll-cooldown: "<red>Голосования доступны раз в {time} сек.!</red>"
poll-limit-reached: "<red>Достигнут лимит активных голосований (макс. {max})!</red>"
poll-too-many-options: "<red>Слишком много вариантов! Максимум: {max}</red>"
poll-created: "<green>Голосование создано! ID: {id}</green>"
poll-vote-usage: "<yellow>Использование: /poll vote <ID> <вариант></yellow>"
poll-invalid-id: "<red>Неверный ID голосования!</red>"
poll-invalid-option: "<red>Неверный вариант! Выберите от 1 до {max}.</red>"
poll-voted: "<green>Ваш голос учтён!</green>"
poll-vote-changed: "<yellow>Ваш голос изменён!</yellow>"
poll-end-usage: "<yellow>Использование: /poll end <ID></yellow>"
poll-ended: "<green>Голосование #{id} завершено!</green>"
poll-not-found: "<red>Голосование не найдено!</red>"
poll-results-usage: "<yellow>Использование: /poll results <ID></yellow>"

# ========================================== #
#      КОМАНДЫ (HELP)                        #
# ========================================== #
help-header: "<dark_gray>========== <aqua>AdvancedChat Помощь</aqua> ==========</dark_gray>"
help-reload: "<aqua>/chat reload</aqua> <gray>- Перезагрузить конфигурацию</gray>"
help-chat: "<aqua>/chat <канал></aqua> <gray>- Переключить канал чата</gray>"
help-silent: "<aqua>/silent</aqua> <gray>- Скрытый режим (сообщения не видны другим)</gray>"
help-ignore: "<aqua>/ignore <игрок></aqua> <gray>- Игнорировать игрока</gray>"
help-chatclear: "<aqua>/chatclear</aqua> <gray>- Очистить чат</gray>"
help-spy: "<aqua>/spy</aqua> <gray>- Режим шпиона (видеть все каналы)</gray>"

# ========================================== #
#      ОЧИСТКА ЧАТА                          #
# ========================================== #
chatclear-personal: "<green>Ваш чат очищен!</green>"
chatclear-global-users: "<green>Чат очищен для всех пользователей!</green>"
chatclear-global-all: "<green>Чат очищен полностью!</green>"

# ========================================== #
#      РЕЖИМЫ                                #
# ========================================== #
# Spy режим
spy-enabled: "<green>Режим шпиона <aqua>включён</aqua>!</green>"
spy-disabled: "<green>Режим шпиона <aqua>выключен</aqua>!</green>"

# Silent режим
silent-enabled: "<green>Silent режим <aqua>включён</aqua>!</green>"
silent-disabled: "<green>Silent режим <aqua>выключен</aqua>!</green>"

# TagToggle режим
tags-enabled-self: "<yellow>Теперь другие игроки не смогут вас упоминать.</yellow>"
tags-disabled-self: "<green>Теперь другие игроки снова могут вас упоминать.</green>"
tags-enabled-other: "<green>Упоминания для {player} отключены.</green>"
tags-disabled-other: "<green>Упоминания для {player} включены.</green>"

# ========================================== #
#      УПОМИНАНИЯ (форматы)                  #
# ========================================== #
mention-format: "<gradient:#00FF00:#00AA00><b>@%player%</b></gradient>"
mention-format-target: "<yellow><b>%player%</b></yellow>"
mention-format-others: "<green>%player%</green>"
mention-actionbar: "<gold>Вас упомянули в чате!</gold>"

# ========================================== #
#      ССЫЛКИ                                #
# ========================================== #
link-format: "<hover:show_text:'<gray>Нажмите для перехода:<br><white>%link%</white>'><click:open_url:'%url%'><aqua><b>[Ссылка]</b></aqua></click></hover>"

# ========================================== #
#      УВЕДОМЛЕНИЯ ПЕРСОНАЛУ                 #
# ========================================== #
staff-notification-format: "<red>[Внимание]</red> <yellow>Игрок <player> просит помощи:</yellow> <gray><message></gray>"

# ========================================== #
#      ЗАКРЕПЛЁННЫЕ СООБЩЕНИЯ (форматы)      #
# ========================================== #
pinned-message-format: "<bold><gold>[ЗАКРЕПЛЕНО]</gold></bold> <white><message></white>"

# ========================================== #
#      ГОЛОСОВАНИЯ (форматы)                 #
# ========================================== #
poll-question-format: "<dark_gray>========== <aqua>Голосование #{id}</aqua> ==========</dark_gray><newline><white><b><question></b></white>"
poll-option-format: "<gray>{index}. </gray><white><option></white> <dark_gray>- <hover:show_text:'<green>Голосовать</green>'><click:run_command:'/poll vote {id} {index}'><aqua>[Голосовать]</aqua></click></hover></dark_gray>"
poll-results-format: "<dark_gray>========== <aqua>Результаты голосования #{id}</aqua> ==========</dark_gray><newline><white><b><question></b></white><newline><total_votes> голос(ов)</total_votes>"
poll-result-option-format: "<gray>{index}. </gray><white><option></white> <dark_gray>- <green><votes> голос(ов)</green></dark_gray>"
poll-ended-format: "<dark_gray>========== <aqua>Голосование #{id} завершено</aqua> ==========</dark_gray>"
