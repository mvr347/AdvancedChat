# ========================================== #
#       AdvancedChat Messages Configuration  #
#          Version 2.5                       #
# ========================================== #
# Все текстовые сообщения плагина
# Поддерживает MiniMessage форматирование
# ========================================== #

# Префикс плагина (используется во всех сообщениях)
prefix: "<dark_gray>[<aqua>AdvancedChat</aqua>]</dark_gray> "

# ========================================== #
#           ОБЩИЕ СООБЩЕНИЯ                  #
# ========================================== #
no-permission: "<red>У вас нет прав для выполнения этой команды!</red>"
reload-success: "<green>Конфигурация успешно перезагружена!</green>"
reload-messages-success: "<green>Сообщения успешно перезагружены!</green>"
player-not-found: "<red>Игрок не найден!</red>"
player-only: "<red>Эта команда только для игроков!</red>"

# ========================================== #
#         КАНАЛЫ ЧАТА                        #
# ========================================== #
channel-switched: "<green>Вы переключились на канал <aqua>{channel}</aqua>!</green>"
channel-not-found: "<red>Канал не найден!</red>"
no-permission-channel: "<red>У вас нет прав для использования этого канала!</red>"

# ========================================== #
#      УПРАВЛЕНИЕ СООБЩЕНИЯМИ                #
# ========================================== #
# Удаление сообщений
delete-success: "<green>Сообщение #{id} удалено!</green>"
delete-not-found: "<red>Сообщение не найдено!</red>"
delete-not-yours: "<red>Вы можете удалять только свои сообщения!</red>"

# Редактирование сообщений
edit-success: "<green>Сообщение #{id} отредактировано!</green>"
edit-cancelled: "<red>Редактирование отменено!</red>"
edit-not-found: "<red>Сообщение не найдено!</red>"
edit-not-yours: "<red>Вы можете редактировать только свои сообщения!</red>"
edit-prompt: "<yellow>Редактирование сообщения. Введите новое сообщение или измените старое.</yellow><newline><gray>Напишите </gray><red><click:run_command:'/medit cancel'><hover:show_text:'Нажмите для отмены'>cancel</hover></click></red><gray> для отмены.</gray>"
edit-cancelled-command: "<yellow>Редактирование сброшено (введена команда).</yellow>"
edit-cancelled-click: "<red>Редактирование отменено.</red>"

# ========================================== #
#         ИГНОР ЛИСТ                          #
# ========================================== #
ignore-usage: "<yellow>Использование: /ignore <игрок></yellow>"
ignore-not-found: "<red>Игрок не найден!</red>"
ignore-self: "<red>Нельзя игнорировать самого себя!</red>"
ignore-admin: "<red>Нельзя игнорировать администратора!</red>"
ignore-added: "<green>Вы добавили <aqua>{player}</aqua> в игнор-лист.</green>"
ignore-removed: "<green>Вы удалили <aqua>{player}</aqua> из игнор-листа.</green>"

# ========================================== #
#      УПОМИНАНИЯ (MENTIONS)                 #
# ========================================== #
mention-everyone-cooldown: "<red>Использование @everyone доступно через {time} сек.!</red>"

# ========================================== #
#      ЗАКРЕПЛЁННЫЕ СООБЩЕНИЯ                #
# ========================================== #
pin-no-permission: "<red>У вас нет прав для закрепления сообщений!</red>"
pin-usage: "<yellow>Использование: /pin <ID сообщения></yellow>"
pin-remove-usage: "<yellow>Использование: /pin remove <ID закрепления></yellow>"
pin-invalid-id: "<red>Неверный ID сообщения!</red>"
pin-replaced: "<yellow>Предыдущее закреплённое сообщение снято.</yellow>"
pin-limit-reached: "<red>Достигнут лимит закреплённых сообщений (макс. {max})!</red>"
